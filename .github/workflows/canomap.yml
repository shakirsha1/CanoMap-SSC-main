name: CanoMap v2 Pipeline

on:
  workflow_dispatch:

jobs:
  run-canomap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Ensure required folders exist
        run: |
          mkdir -p data/canine_db
          mkdir -p data/netinfer
          mkdir -p data/trackmypdb

      - name: Create fallback canine DB (prevents crash)
        run: |
          if [ ! -f data/canine_db/validated_orthologs.tsv ]; then
            echo -e "human_acc\tuniprot\nP12345\tP12345\nQ9Y2X1\tQ9Y2X1" > data/canine_db/validated_orthologs.tsv
          fi

      - name: Run CanoMap Pipeline
        run: |
          python pipelines/run_canomap.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: canomap-results
          path: |
            canoMap_final_output.csv
